<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤝 任务协作平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --bg-hover: #475569;
      --accent-primary: #6366f1;
      --accent-secondary: #8b5cf6;
      --accent-success: #22c55e;
      --accent-warning: #f59e0b;
      --accent-error: #ef4444;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border-color: #334155;
      --radius-sm: 6px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-full: 9999px;
      --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.3);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.3);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.4);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; line-height: 1.6; }
    header { background: linear-gradient(135deg, var(--bg-secondary) 0%, #151f32 100%); padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
    .header-title { font-size: 1.25rem; font-weight: 700; background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .header-info { font-size: 0.875rem; color: var(--text-secondary); font-variant-numeric: tabular-nums; background: var(--bg-tertiary); padding: 0.5rem 1rem; border-radius: var(--radius-full); }
    .tabs { background: var(--bg-secondary); display: flex; gap: 0.5rem; padding: 0.75rem 1.5rem; border-bottom: 1px solid var(--border-color); overflow-x: auto; }
    .tab { padding: 0.625rem 1.25rem; border: none; background: transparent; cursor: pointer; color: var(--text-secondary); font-size: 0.875rem; font-weight: 500; border-radius: var(--radius-md); transition: all 0.2s ease; white-space: nowrap; display: flex; align-items: center; gap: 0.5rem; }
    .tab:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .tab.active { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4); }
    main { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }
    .panel { display: none; animation: fadeIn 0.3s ease; }
    .panel.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .panel-title { font-size: 1.5rem; font-weight: 600; }
    .panel-desc { color: var(--text-secondary); font-size: 0.875rem; margin-top: 0.25rem; }
    #nodeList { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
    .node-card { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 1.25rem; transition: all 0.25s ease; position: relative; overflow: hidden; }
    .node-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent-error); opacity: 0; transition: opacity 0.2s ease; }
    .node-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--accent-primary); }
    .node-card:hover::before { opacity: 1; background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary)); }
    .node-card.status-online { border-color: rgba(34, 197, 94, 0.3); }
    .node-card.status-online::before { background: var(--accent-success); opacity: 1; }
    .node-card.status-offline { border-color: rgba(239, 68, 68, 0.3); }
    .node-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
    .node-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border-color); flex-shrink: 0; }
    .status-indicator { width: 12px; height: 12px; border-radius: 50%; position: relative; }
    .status-indicator.online { background: var(--accent-success); box-shadow: 0 0 12px var(--accent-success); }
    .status-indicator.offline { background: var(--accent-error); box-shadow: 0 0 12px var(--accent-error); }
    .node-name { font-size: 1.125rem; font-weight: 600; }
    .node-details { display: flex; flex-direction: column; gap: 0.5rem; }
    .node-info { display: flex; justify-content: space-between; font-size: 0.875rem; color: var(--text-secondary); }
    .node-info-label { color: var(--text-muted); }
    .node-info-value { color: var(--text-primary); font-weight: 500; }
    .status-badge { display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.25rem 0.75rem; border-radius: var(--radius-full); font-size: 0.75rem; font-weight: 500; }
    .status-badge.online { background: rgba(34, 197, 94, 0.15); color: var(--accent-success); }
    .status-badge.offline { background: rgba(239, 68, 68, 0.15); color: var(--accent-error); }
    #messageList { display: flex; flex-direction: column; gap: 0.75rem; }
    .date-separator { text-align: center; padding: 1rem 0; position: relative; }
    .date-separator span { background: var(--bg-primary); padding: 0.5rem 1rem; color: var(--text-muted); font-size: 0.75rem; border-radius: var(--radius-full); border: 1px solid var(--border-color); position: relative; z-index: 1; }
    .date-separator::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border-color); }
    .chat-bubble { display: flex; align-items: flex-start; gap: 0.75rem; padding: 1rem; background: var(--bg-secondary); border-radius: var(--radius-lg); cursor: pointer; transition: all 0.2s ease; border: 1px solid transparent; }
    .chat-bubble:hover { background: var(--bg-tertiary); transform: translateX(4px); border-color: var(--border-color); }
    .chat-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: var(--bg-tertiary); border: 2px solid var(--accent-primary); }
    .chat-body { flex: 1; min-width: 0; }
    .chat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.375rem; flex-wrap: wrap; gap: 0.5rem; }
    .chat-name { font-weight: 600; font-size: 0.9375rem; }
    .chat-to { font-size: 0.75rem; color: var(--accent-secondary); background: rgba(139, 92, 246, 0.15); padding: 0.125rem 0.5rem; border-radius: var(--radius-full); }
    .chat-time { font-size: 0.75rem; color: var(--text-muted); }
    .chat-content { font-size: 0.9375rem; color: var(--text-secondary); word-break: break-word; white-space: pre-wrap; line-height: 1.5; }
    .chat-meta { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
    .status-dot.ok { background: var(--accent-success); box-shadow: 0 0 8px rgba(34, 197, 94, 0.5); }
    .status-dot.fail { background: var(--accent-error); box-shadow: 0 0 8px rgba(239, 68, 68, 0.5); }
    .status-dot.pending { background: var(--accent-warning); box-shadow: 0 0 8px rgba(245, 158, 11, 0.5); }
    .status-text { font-size: 0.75rem; color: var(--text-muted); }
    #taskList { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.25rem; }
    .kanban-column { background: var(--bg-secondary); border-radius: var(--radius-lg); border: 1px solid var(--border-color); overflow: hidden; }
    .kanban-header { padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-color); }
    .kanban-header.todo { background: linear-gradient(90deg, rgba(99, 102, 241, 0.1), transparent); border-left: 3px solid var(--accent-primary); }
    .kanban-header.in-progress { background: linear-gradient(90deg, rgba(245, 158, 11, 0.1), transparent); border-left: 3px solid var(--accent-warning); }
    .kanban-header.done { background: linear-gradient(90deg, rgba(34, 197, 94, 0.1), transparent); border-left: 3px solid var(--accent-success); }
    .kanban-title { font-weight: 600; font-size: 0.9375rem; }
    .kanban-count { background: var(--bg-tertiary); padding: 0.25rem 0.625rem; border-radius: var(--radius-full); font-size: 0.75rem; color: var(--text-secondary); }
    .kanban-cards { padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; min-height: 200px; }
    .task-card { background: var(--bg-tertiary); border-radius: var(--radius-md); padding: 1rem; border-left: 3px solid var(--accent-primary); transition: all 0.2s ease; }
    .task-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .task-card.in-progress { border-left-color: var(--accent-warning); }
    .task-card.done { border-left-color: var(--accent-success); opacity: 0.7; }
    .task-title { font-size: 0.9375rem; font-weight: 500; margin-bottom: 0.5rem; }
    .task-done .task-title { text-decoration: line-through; color: var(--text-muted); }
    .task-badges { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .badge { padding: 0.25rem 0.625rem; border-radius: var(--radius-full); font-size: 0.6875rem; font-weight: 500; }
    .badge-owner { background: rgba(99, 102, 241, 0.2); color: var(--accent-primary); }
    .badge-priority { background: rgba(239, 68, 68, 0.2); color: var(--accent-error); }
    .badge-status { background: rgba(34, 197, 94, 0.2); color: var(--accent-success); }
    .badge-progress { background: rgba(245, 158, 11, 0.2); color: var(--accent-warning); }
    .discussion-card { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; cursor: pointer; transition: all 0.2s ease; }
    .discussion-card:hover { border-color: var(--accent-primary); transform: translateX(4px); box-shadow: var(--shadow-md); }
    .discussion-title { font-size: 1.125rem; font-weight: 600; margin-bottom: 0.5rem; }
    .discussion-meta { display: flex; gap: 1rem; font-size: 0.875rem; color: var(--text-muted); }
    .dead-letter-card { background: var(--bg-secondary); border: 1px solid rgba(239, 68, 68, 0.3); border-left: 4px solid var(--accent-error); border-radius: var(--radius-md); padding: 1.25rem; margin-bottom: 1rem; }
    .dead-letter-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .dead-letter-route { font-weight: 500; }
    .dead-letter-status { color: var(--accent-error); font-size: 0.875rem; }
    .dead-letter-preview { color: var(--text-secondary); font-size: 0.9375rem; margin-bottom: 0.75rem; padding: 0.75rem; background: var(--bg-tertiary); border-radius: var(--radius-sm); }
    .dead-letter-error { color: var(--accent-error); font-size: 0.8125rem; margin-bottom: 1rem; }
    .dead-letter-actions { display: flex; gap: 0.75rem; }
    button { padding: 0.5rem 1rem; border: none; border-radius: var(--radius-md); cursor: pointer; font-size: 0.875rem; font-weight: 500; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 0.5rem; }
    .btn-primary { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4); }
    .btn-danger { background: rgba(239, 68, 68, 0.15); color: var(--accent-error); border: 1px solid rgba(239, 68, 68, 0.3); }
    .btn-danger:hover { background: rgba(239, 68, 68, 0.25); }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
    .modal.active { display: flex; animation: fadeIn 0.2s ease; }
    .modal-content { background: var(--bg-secondary); padding: 1.5rem; border-radius: var(--radius-lg); max-width: 640px; width: 90%; max-height: 80vh; overflow-y: auto; border: 1px solid var(--border-color); box-shadow: var(--shadow-lg); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-color); }
    .modal-title { font-size: 1.25rem; font-weight: 600; }
    .modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; padding: 0; line-height: 1; }
    .modal-close:hover { color: var(--text-primary); }
    .modal-body { white-space: pre-wrap; line-height: 1.6; color: var(--text-secondary); }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
    .empty-text { font-size: 1rem; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--bg-hover); }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    .chat-bubble { animation: slideIn 0.3s ease; }
  </style>
</head>
<body>
  <header>
    <span class="header-title">🤝 任务协作平台</span>
    <span class="header-info" id="clock"></span>
  </header>
  <nav class="tabs">
    <button class="tab active" onclick="switchTab('status')"><span>📊</span> 运行状态</button>
    <button class="tab" onclick="switchTab('messages')"><span>💬</span> 消息流</button>
    <button class="tab" onclick="switchTab('tasks')"><span>📋</span> 任务板</button>
    <button class="tab" onclick="switchTab('discussions')"><span>💭</span> 讨论存档</button>
    <button class="tab" onclick="switchTab('deadletters')"><span>⚠️</span> 失败消息</button>
  </nav>
  <main>
    <div id="status" class="panel active">
      <div class="panel-header"><div><h2 class="panel-title">🎯 AI 运行节点</h2><p class="panel-desc">实时监控所有 AI 助手的状态</p></div></div>
      <div id="nodeList"></div>
    </div>
    <div id="messages" class="panel">
      <div class="panel-header"><div><h2 class="panel-title">💬 消息流</h2><p class="panel-desc">AI 之间的协作消息</p></div></div>
      <div id="messageList"></div>
    </div>
    <div id="tasks" class="panel">
      <div class="panel-header"><div><h2 class="panel-title">📋 任务看板</h2><p class="panel-desc">任务进度一目了然</p></div></div>
      <div id="taskList"></div>
    </div>
    <div id="discussions" class="panel">
      <div class="panel-header"><div><h2 class="panel-title">💭 讨论存档</h2><p class="panel-desc">历史讨论记录</p></div></div>
      <div id="discussionList"></div>
    </div>
    <div id="deadletters" class="panel">
      <div class="panel-header"><div><h2 class="panel-title">⚠️ 失败消息</h2><p class="panel-desc">需要处理的消息</p></div></div>
      <div id="deadLetterList"></div>
    </div>
  </main>
  <div id="modal" class="modal" onclick="this.classList.remove('active')">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header"><h3 class="modal-title" id="modalTitle"></h3><button class="modal-close" onclick="document.getElementById('modal').classList.remove('active')">&times;</button></div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>
  <script>
    const AI_CONFIG = { "wisp": { name: "Wisp" }, "spark": { name: "Spark" }, "cipher": { name: "Cipher" }, "nexus": { name: "Nexus" }, "pulse": { name: "Pulse" }, "flux": { name: "Flux" }, "nova": { name: "Nova" } };
    const DEFAULT_AVATAR = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='20' fill='%23cbd5e1'/%3E%3Ctext x='50%25' y='55%25' text-anchor='middle' dy='.3em' font-size='18'%3E👤%3C/text%3E%3C/svg%3E";
    function getAvatar(from) { return '/api/avatar/' + encodeURIComponent(from.toLowerCase()); }
    function getAIDisplayName(from) { const cfg = AI_CONFIG[from.toLowerCase()]; return cfg ? cfg.name : from; }
    function switchTab(id) { document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); event.target.closest('.tab').classList.add('active'); }
    function showModal(title, body) { document.getElementById('modalTitle').innerText = title; document.getElementById('modalBody').innerText = body; document.getElementById('modal').classList.add('active'); }
    function escape(s) { return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
    function formatTime(ts) { if (!ts) return ''; try { const d = new Date(ts); return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0'); } catch(e) { return ts; } }
    function formatDate(ts) { if (!ts) return ''; try { const d = new Date(ts); return d.getFullYear() + '年' + (d.getMonth()+1).toString().padStart(2,'0') + '月' + d.getDate().toString().padStart(2,'0') + '日'; } catch(e) { return ts; } }
    function scrollToBottom(force) { const msgPanel = document.getElementById('messages'); if (!msgPanel.classList.contains('active') && !force) return; setTimeout(function() { window.scrollTo(0, document.body.scrollHeight); }, 100); }
    function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
    setInterval(updateClock, 1000); updateClock();
    var nodes = [{n:'Wisp',p:18789},{n:'Spark',p:19000},{n:'Cipher',p:19100},{n:'Nexus',p:19200},{n:'Pulse',p:19300},{n:'Flux',p:19400},{n:'Nova',p:19500}];
    function refreshStatus() { var html = ''; nodes.forEach(function(n) { (function(node) { fetch('http://127.0.0.1:'+node.p+'/',{mode:'no-cors',cache:'no-store'}).then(function(){ html += '<div class="node-card status-online"><div class="node-header"><img class="node-avatar" src="'+escape(getAvatar(node.n))+'" onerror="this.src=\''+DEFAULT_AVATAR+'\'" alt=""><span class="node-name">'+node.n+'</span></div><div class="node-details"><div class="node-info"><span class="node-info-label">端口</span><span class="node-info-value">'+node.p+'</span></div><div class="node-info"><span class="node-info-label">状态</span><span class="status-badge online">🟢 在线</span></div></div></div>'; }).catch(function(){ html += '<div class="node-card status-offline"><div class="node-header"><img class="node-avatar" src="'+escape(getAvatar(node.n))+'" onerror="this.src=\''+DEFAULT_AVATAR+'\'" alt=""><span class="node-name">'+node.n+'</span></div><div class="node-details"><div class="node-info"><span class="node-info-label">端口</span><span class="node-info-value">'+node.p+'</span></div><div class="node-info"><span class="node-info-label">状态</span><span class="status-badge offline">🔴 离线</span></div></div></div>'; }); })(n); }); setTimeout(function(){document.getElementById('nodeList').innerHTML=html;},1500); }
    var msgs = []; var lastMsgCount = 0;
    var renderedIds = new Set();
    var firstLoad = true;

    function buildMsgHTML(m, addDateSep) {
      var processed = m.processedBy||[];
      var failed = m.failedBy||[];
      var statusClass = 'pending';
      var statusText = '⏳ 待处理';
      if (processed.length > 0) { statusClass = 'ok'; statusText = '✓ 已处理'; }
      else if (failed.length > 0) { statusClass = 'fail'; statusText = '✗ 失败'; }
      var toLine = (m.to&&m.to.length) ? '<span class="chat-to">→ ' + m.to.join(', ') + '</span>' : '';
      var dateSep = addDateSep ? '<div class="date-separator"><span>' + formatDate(m.timestamp) + '</span></div>' : '';
      return dateSep + '<div class="chat-bubble" onclick="viewMsg(\''+m.id+'\')"><img class="chat-avatar" src="'+escape(getAvatar(m.from))+'" onerror="this.src=\''+DEFAULT_AVATAR+'\';this.className=\'chat-avatar\'" alt=""><div class="chat-body"><div class="chat-header"><span><span class="chat-name">'+escape(getAIDisplayName(m.from))+'</span>'+toLine+'</span><span class="chat-time">'+formatTime(m.timestamp)+'</span></div><div class="chat-content">'+escape(m.content)+'</div><div class="chat-meta"><span class="status-dot '+statusClass+'"></span><span class="status-text">'+statusText+'</span></div></div></div>';
    }

    function loadMessages() { fetch('/api/messages').then(function(r){return r.json()}).then(function(data){ lastMsgCount = data.length; msgs = data; var container = document.getElementById('messageList'); if (firstLoad) { var html = ''; var currentDate = null; data.forEach(function(m){ var curDate = formatDate(m.timestamp); if (curDate !== currentDate) { html += '<div class="date-separator"><span>' + curDate + '</span></div>'; currentDate = curDate; } html += '<div class="chat-bubble" onclick="viewMsg(\''+m.id+'\')"><img class="chat-avatar" src="'+escape(getAvatar(m.from))+'" onerror="this.src=\''+DEFAULT_AVATAR+'\';this.className=\'chat-avatar\'" alt=""><div class="chat-body"><div class="chat-header"><span><span class="chat-name">'+escape(getAIDisplayName(m.from))+'</span>'+((m.to&&m.to.length)?'<span class="chat-to">→ '+m.to.join(', ')+'</span>':'')+'</span><span class="chat-time">'+formatTime(m.timestamp)+'</span></div><div class="chat-content">'+escape(m.content)+'</div><div class="chat-meta"><span class="status-dot '+(m.processedBy&&m.processedBy.length>0?'ok':(m.failedBy&&m.failedBy.length>0?'fail':'pending'))+'"></span><span class="status-text">'+(m.processedBy&&m.processedBy.length>0?'✓ 已处理':(m.failedBy&&m.failedBy.length>0?'✗ 失败':'⏳ 待处理'))+'</span></div></div></div>'; renderedIds.add(m.id); }); container.innerHTML = html || '<div class="empty-state"><div class="empty-icon">💬</div><div class="empty-text">暂无消息</div></div>'; firstLoad = false; } else { data.forEach(function(m){ if (!renderedIds.has(m.id)) { container.insertAdjacentHTML('beforeend', buildMsgHTML(m, false)); renderedIds.add(m.id); } }); if (container.querySelector('.empty-state')) container.innerHTML = ''; } }); }
    function viewMsg(id) { var m = msgs.find(function(x){return x.id==id;}); if(!m) return; var processed = m.processedBy||[]; var failed = m.failedBy||[]; var status = processed.length>0?'✓ 已处理 by '+processed.join(', '):(failed.length>0?'✗ 失败 by '+failed.join(', '):'⏳ 待处理'); showModal('💬 消息详情','【来自】: '+m.from+'\n【发往】: '+(m.to||[]).join(', ')+'\n【状态】: '+status+'\n\n【内容】:\n'+m.content); }
    var tasksData = [];
    function loadTasks() { fetch('/api/tasks').then(function(r){return r.json()}).then(function(d){ var lines = (d.content||'').split('\n'); var todo=[], inProgress=[], done=[]; lines.forEach(function(l){ var m = l.match(/^-\s*\[([ x~])\]\s*(.+?)(?:\s*负责人:\s*(\w+))?(?:\s*优先级:\s*(\w+))?$/); if(m){ var badges = ''; if(m[3]) badges += '<span class="badge badge-owner">👤 '+m[3]+'</span> '; if(m[4]) badges += '<span class="badge badge-priority">🔥 '+m[4]+'</span> '; var card = '<div class="task-card"><div class="task-title">'+escape(m[2].trim())+'</div><div class="task-badges">'+badges+'</div></div>'; if(m[1]==='x') done.push(card); else if(m[1]==='~') inProgress.push(card); else todo.push(card); } }); var html = ''; html += '<div class="kanban-column"><div class="kanban-header todo"><span class="kanban-title">📋 待处理</span><span class="kanban-count">'+todo.length+'</span></div><div class="kanban-cards">'+ (todo.length?todo.join(''):'<div class="empty-state"><div class="empty-text">无待办</div></div>') +'</div></div>'; html += '<div class="kanban-column"><div class="kanban-header in-progress"><span class="kanban-title">🔄 进行中</span><span class="kanban-count">'+inProgress.length+'</span></div><div class="kanban-cards">'+ (inProgress.length?inProgress.join(''):'<div class="empty-state"><div class="empty-text">无进行中</div></div>') +'</div></div>'; html += '<div class="kanban-column"><div class="kanban-header done"><span class="kanban-title">✅ 已完成</span><span class="kanban-count">'+done.length+'</span></div><div class="kanban-cards">'+ (done.length?done.join(''):'<div class="empty-state"><div class="empty-text">无已完成</div></div>') +'</div></div>'; document.getElementById('taskList').innerHTML = html; }); }
    var discussions = [];
    function loadDiscussions() { fetch('/api/discussions').then(function(r){return r.json()}).then(function(data){ discussions = data; var html = ''; data.forEach(function(d,i){html += '<div class="discussion-card" onclick="viewDisc('+i+')"><div class="discussion-title">'+escape(d.title)+'</div><div class="discussion-meta"><span>'+d.date+'</span></div></div>';}); document.getElementById('discussionList').innerHTML = html || '<div class="empty-state"><div class="empty-icon">💭</div><div class="empty-text">无讨论</div></div>'; }); }
    function viewDisc(idx) { var d = discussions[idx]; if(!d) return; fetch('/api/discussion?file='+encodeURIComponent(d.filename)).then(function(r){return r.text()}).then(function(text){ showModal('💭 ' + d.title, text); }); }
    function loadDeadLetters() { fetch('/api/dead-letters').then(function(r){return r.json()}).then(function(data){ if(data.length==0){document.getElementById('deadLetterList').innerHTML='<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">暂无失败消息</div></div>';return;} var html = ''; data.forEach(function(d){ html += '<div class="dead-letter-card"><div class="dead-letter-header"><span class="dead-letter-route"><b>'+escape(d.from)+'</b> → '+(d.to||[]).join(', ')+'</span><span class="dead-letter-status">❌ 失败</span></div><div class="dead-letter-preview">'+escape(d.content||'').slice(0,80)+'...</div><div class="dead-letter-error">错误: '+escape(d.error||'未知')+'</div><div class="dead-letter-actions"><button class="btn-primary" onclick="resend(\''+escape(d.filename)+'\')">📤 重发</button><button class="btn-danger" onclick="del(\''+escape(d.filename)+'\')">🗑️ 删除</button></div></div>'; }); document.getElementById('deadLetterList').innerHTML = html; }); }
    function resend(f) { if(!confirm('确定重发?')) return; fetch('/api/dead-letter/resend?file='+encodeURIComponent(f),{method:'POST'}).then(function(r){return r.json()}).then(function(d){ if(d.success) loadDeadLetters(); else alert('失败:'+d.error); }); }
    function del(f) { if(!confirm('确定删除?')) return; fetch('/api/dead-letter/delete?file='+encodeURIComponent(f),{method:'POST'}).then(function(r){return r.json()}).then(function(d){ if(d.success) loadDeadLetters(); }); }
    var refocusTimer = null;
    document.addEventListener('visibilitychange', function() { if (document.hidden) return; if (refocusTimer) clearTimeout(refocusTimer); refocusTimer = setTimeout(function() { refreshStatus(); loadMessages(); }, 1000); });
    refreshStatus(); setInterval(refreshStatus, 5000); loadMessages(); setInterval(loadMessages, 5000); loadTasks(); loadDiscussions(); loadDeadLetters();
  </script>
</body>
</html>
